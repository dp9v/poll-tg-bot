name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version (e.g. 1.0.0). If empty, current date/time will be used.'
        required: false
        default: ''

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.CR_PAT }}

      - name: Set version tag
        id: version_tag
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION=$(date -u +"%d-%m-%Y-%H-%M")
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ secrets.USERNAME }}/poll-tg-bot:${{ steps.version_tag.outputs.version }}
            ghcr.io/${{ secrets.USERNAME }}/poll-tg-bot:latest


