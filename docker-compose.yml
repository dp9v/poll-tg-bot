services:
  bot:
    image: ghcr.io/dp9v/poll-tg-bot:04-03-2026-1
    container_name: poll-tg-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - BEARER_TOKEN=${BEARER_TOKEN}
      - DATABASE_URL=postgres://bot:${POSTGRES_PASSWORD:-bot}@postgres:5432/bot?sslmode=disable
      - NEAR_INTERVAL=${NEAR_INTERVAL:-15m}
      - LONGTERM_INTERVAL=${LONGTERM_INTERVAL:-60m}
      - PAGE_SIZE=${PAGE_SIZE:-200}
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
